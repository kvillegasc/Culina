<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Culina | Crear receta</title>

<link rel="stylesheet" href="../assets/css/base.css">
<link rel="stylesheet" href="../assets/css/layout.css">
<link rel="stylesheet" href="../assets/css/components.css">
<link rel="stylesheet" href="../assets/css/responsive.css">

</head>

<body>

<header>

<a href="dashboard-chef.html" class="logo">

CULINA

</a>

<nav class="top-nav">

<a href="dashboard-chef.html">

Dashboard

</a>

<a class="active">

Crear receta

</a>

</nav>

</header>

<main>

<section class="page-title">

<h1>

Crear nueva receta

</h1>

<p>

Completa la información para compartir una receta con la comunidad.

</p>

</section>

<form class="recipe-form">

<div class="form-grid">

<div>

<label>

Nombre de la receta

</label>

<input
type="text"
placeholder="Ej. Lasaña italiana">

</div>

<div>

<label>

Categoría

</label>

<select>

<option>Desayuno</option>

<option>Almuerzo</option>

<option>Cena</option>

<option>Postre</option>

</select>

</div>

</div>

<label>

Ingredientes

</label>

<textarea
rows="5"
placeholder="Escribe cada ingrediente..."></textarea>

<label>

Preparación

</label>

<textarea
rows="8"
placeholder="Describe el paso a paso..."></textarea>

<div class="form-grid">

<div>

<label>

Tiempo de preparación

</label>

<input
type="text"
placeholder="30 minutos">

</div>

<div>

<label>

Costo estimado

</label>

<input
type="text"
placeholder="$10">

</div>

</div>

<button class="btn">

Publicar receta

</button>

</form>

</main>

<footer>

© 2026 Culina

</footer>

</body>

</html>
